  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

xt-transform:uppercase; color:var(--muted); margin:0 0 6px;\">Најактивни автори</h2>\n        <sc-for list=\"{{ authors }}\" as=\"a\" hint-placeholder-count=\"10\">\n          <div style=\"display:grid; grid-template-columns:30px 1fr auto; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border2);\">\n            <div style=\"font-size:12px; font-weight:700; color:var(--faint); font-variant-numeric:tabular-nums; letter-spacing:.02em;\">{{ a.rank }}</div>\n            <div style=\"font-weight:600; font-size:14.5px; letter-spacing:-.01em;\">{{ a.name }}</div>\n            <div style=\"font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums;\">{{ a.valueText }}</div>\n          </div>\n        </sc-for>\n      </div>\n      <div style=\"background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:var(--shadow);\">\n        <h2 style=\"font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:0 0 6px;\">Најангажирани објави</h2>\n        <sc-for list=\"{{ engagement }}\" as=\"e\" hint-placeholder-count=\"10\">\n          <div style=\"display:grid; grid-template-columns:30px 1fr auto; align-items:center; gap:12px; padding:11px 0; border-bottom:1px solid var(--border2);\">\n            <div style=\"font-size:12px; font-weight:700; color:var(--faint); font-variant-numeric:tabular-nums; letter-spacing:.02em;\">{{ e.rank }}</div>\n            <div style=\"font-weight:600; font-size:14.5px; letter-spacing:-.01em;\">{{ e.name }}</div>\n            <div style=\"font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums;\">{{ e.valueText }}</div>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- EXPLORER -->\n    <div style=\"margin-top:56px; background:var(--surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); overflow:hidden;\">\n      <div style=\"padding:26px 26px 0;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;\">\n          <h2 style=\"font-size:23px; font-weight:800; letter-spacing:-.03em; margin:0;\">Истражувач на објави</h2>\n          <span style=\"font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; letter-spacing:.01em;\">{{ resultText }}</span>\n        </div>\n\n        <!-- toolbar -->\n        <div style=\"display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; align-items:center;\">\n          <div style=\"position:relative; flex:1; min-width:240px;\">\n            <span style=\"position:absolute; left:13px; top:50%; transform:translateY(-50%); width:14px; height:14px; border:2px solid var(--faint); border-radius:50%;\"></span>\n            <span style=\"position:absolute; left:23px; top:calc(50% + 5px); width:7px; height:2px; background:var(--faint); transform:rotate(45deg); border-radius:2px;\"></span>\n            <input type=\"search\" value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Пребарај автор, тема или текст…\" style=\"width:100%; font-family:inherit; font-size:14.5px; color:var(--text); background:var(--surface2); border:1px solid var(--border); border-radius:11px; padding:12px 14px 12px 36px; outline:none; transition:border-color .15s ease, box-shadow .15s ease;\" style-focus=\"border-color:var(--nat); box-shadow:0 0 0 3px var(--nat-bg);\">\n          </div>\n          <button onclick=\"{{ onClearAll }}\" style=\"font-family:inherit; font-size:13.5px; font-weight:600; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:12px 16px; cursor:pointer; white-space:nowrap; transition:background .15s ease;\" style-hover=\"background:var(--surface2);\">Исчисти ×</button>\n        </div>\n\n        <!-- active chips -->\n        <sc-if value=\"{{ hasFilters }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-wrap:wrap; gap:7px; margin-top:13px;\">\n            <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ chip.onRemove }}\" style=\"{{ chip.style }}\" style-hover=\"filter:brightness(.97);\">\n                <span style=\"{{ chip.dotStyle }}\"></span>\n                {{ chip.label }}\n                <span style=\"font-size:14px; line-height:1; opacity:.6; margin-left:1px;\">✕</span>\n              </button>\n            </sc-for>\n          </div>\n        </sc-if>\n      </div>\n\n      <!-- div-grid table (avoids HTML foster-parenting of sc-for inside tbody) -->\n      <div class=\"mk-scroll\" style=\"margin-top:18px; max-height:680px; overflow:auto; border-top:1px solid var(--border);\">\n        <div style=\"min-width:940px; font-size:13.5px;\">\n          <div style=\"display:grid; grid-template-columns:50px 155px 138px 130px minmax(280px,1fr) 66px 52px 68px; position:sticky; top:0; z-index:3; background:var(--surface2); border-bottom:1px solid var(--border);\">\n            <div data-sortkey=\"n\" onclick=\"{{ onSort }}\" style=\"text-align:right; padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">#{{ ind.n }}</div>\n            <div data-sortkey=\"catLabel\" onclick=\"{{ onSort }}\" style=\"padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">Тоналитет{{ ind.catLabel }}</div>\n            <div data-sortkey=\"theme\" onclick=\"{{ onSort }}\" style=\"padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">Тема{{ ind.theme }}</div>\n            <div data-sortkey=\"author\" onclick=\"{{ onSort }}\" style=\"padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">Автор{{ ind.author }}</div>\n            <div style=\"padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint);\">Текст</div>\n            <div data-sortkey=\"likes\" onclick=\"{{ onSort }}\" style=\"text-align:right; padding:12px 10px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">♥{{ ind.likes }}</div>\n            <div data-sortkey=\"rt\" onclick=\"{{ onSort }}\" style=\"text-align:right; padding:12px 8px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">RT{{ ind.rt }}</div>\n            <div data-sortkey=\"replies\" onclick=\"{{ onSort }}\" style=\"text-align:right; padding:12px 14px; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); cursor:pointer; user-select:none;\">Одг.{{ ind.replies }}</div>\n          </div>\n          <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"12\">\n            <div onclick=\"{{ row.onToggle }}\" style=\"display:grid; grid-template-columns:50px 155px 138px 130px minmax(280px,1fr) 66px 52px 68px; align-items:start; border-bottom:1px solid var(--border2); cursor:pointer; transition:background .12s ease;\" style-hover=\"background:var(--surface2);\">\n              <div style=\"text-align:right; padding:13px 14px; color:var(--faint); font-variant-numeric:tabular-nums;\">{{ row.n }}</div>\n              <div style=\"padding:13px 14px;\"><span style=\"{{ row.pillStyle }}\"><span style=\"{{ row.dotStyle }}\"></span>{{ row.catShort }}</span></div>\n              <div style=\"padding:13px 14px; color:var(--muted); line-height:1.4;\">{{ row.theme }}</div>\n              <div style=\"padding:13px 14px; font-weight:600; word-break:break-word;\">{{ row.author }}</div>\n              <div style=\"padding:13px 14px; line-height:1.55;\">\n                <div class=\"{{ row.clampClass }}\">{{ row.text }}</div>\n                <sc-if value=\"{{ row.expanded }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:9px; font-size:12.5px; color:var(--muted);\"><span style=\"color:var(--faint);\">Причина · </span>{{ row.reason }}</div>\n                </sc-if>\n              </div>\n              <div style=\"text-align:right; padding:13px 10px; color:var(--muted); font-variant-numeric:tabular-nums;\">{{ row.likes }}</div>\n              <div style=\"text-align:right; padding:13px 8px; color:var(--muted); font-variant-numeric:tabular-nums;\">{{ row.rt }}</div>\n              <div style=\"text-align:right; padding:13px 14px; color:var(--muted); font-variant-numeric:tabular-nums;\">{{ row.replies }}</div>\n            </div>\n          </sc-for>\n          <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:64px 24px; text-align:center;\">\n              <div style=\"font-size:15px; font-weight:600; color:var(--text);\">Нема резултати</div>\n              <div style=\"font-size:13.5px; color:var(--muted); margin-top:6px;\">Промени го пребарувањето или исчисти ги филтрите.</div>\n            </div>\n          </sc-if>\n        </div>\n      </div>\n      <div style=\"padding:15px 26px; border-top:1px solid var(--border); font-size:12px; color:var(--faint); letter-spacing:.01em;\">Кликни на ред за да го видиш целиот текст и причината · кликни на заглавие за сортирање</div>\n    </div>\n\n    <!-- METHODOLOGY -->\n    <sc-if value=\"{{ showMethod }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:16px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 30px; box-shadow:var(--shadow);\">\n        <h2 style=\"font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--nat); margin:0 0 16px;\">Методологија</h2>\n        <p style=\"font-size:14.5px; line-height:1.65; color:var(--muted); margin:0 0 12px; max-width:90ch;\">Класификацијата е извршена со комбинација од автоматска анализа на содржината и правила за категоризација. Објавите се распределени во категории: позитивни, неутрални, негативни, национализам/ревизионизам и говор на омраза.</p>\n        <p style=\"font-size:14.5px; line-height:1.65; color:var(--muted); margin:0 0 12px; max-width:90ch;\">Национализам/ревизионизам се однесува на содржини поврзани со идентитетски, историски или територијални присвојувања и спорови, додека говорот на омраза опфаќа навреди, деградирање, дехуманизација или негирање на етнички, национални или други групи.</p>\n        <p style=\"font-size:14.5px; line-height:1.65; color:var(--muted); margin:0; max-width:90ch;\">Иако анализата е извршена врз целокупниот сет на податоци, можно е да постојат поединечни погрешни класификации поради контекст, сарказам, иронија или повеќезначност на одредени објави. Проценката е дека ваквите отстапувања сочинуваат помалку од 5% од вкупниот број анализирани објави и немаат значително влијание врз општите трендови и заклучоци.</p>\n      </div>\n    </sc-if>\n\n    <p style=\"font-size:12.5px; line-height:1.5; color:var(--faint); margin:22px 4px 0; max-width:80ch;\">Забелешка: резултатите се наменети за аналитички преглед и треба да се читаат како индикативна, а не правна класификација.</p>\n\n  </div>\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:960},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;},&quot;showMethodology&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  EMBED = JSON.parse(\"[{\\\"n\\\":1,\\\ "#7c7870\",\"--neu-bg\":\"#eceae4\",\"--neg\":\"#c47518\",\"--neg-bg\":\"#f8ecda\",\"--nat\":\"#6a4fd0\",\"--nat-bg\":\"#ebe6fa\",\"--hate\":\"#cf4843\",\"--hate-bg\":\"#f9e5e3\",\"--accent\":\"#1b1a17\" },\n    dark: { \"--bg\":\"#100f12\",\"--surface\":\"#18171b\",\"--surface2\":\"#1f1e23\",\"--surface3\":\"#2a282f\",\"--border\":\"#2c2a31\",\"--border2\":\"#211f25\",\"--text\":\"#ebe9e4\",\"--muted\":\"#a09c95\",\"--faint\":\"#6c685f\",\"--shadow\":\"0 1px 2px rgba(0,0,0,.5),0 12px 36px rgba(0,0,0,.35)\",\"--pos\":\"#46c98a\",\"--pos-bg\":\"#10271c\",\"--neu\":\"#a09c95\",\"--neu-bg\":\"#26242a\",\"--neg\":\"#e2a655\",\"--neg-bg\":\"#2c2310\",\"--nat\":\"#a791f7\",\"--nat-bg\":\"#221c3a\",\"--hate\":\"#ef7370\",\"--hate-bg\":\"#2e1816\",\"--accent\":\"#ebe9e4\" }\n  };\n\n  CAT = {\n    green:  { label:\"Позитивен\", short:\"Позитивен\", c:\"var(--pos)\", bg:\"var(--pos-bg)\" },\n    gray:   { label:\"Неутрален\", short:\"Неутрален\", c:\"var(--neu)\", bg:\"var(--neu-bg)\" },\n    orange: { label:\"Негативен\", short:\"Негативен\", c:\"var(--neg)\", bg:\"var(--neg-bg)\" },\n    purple: { label:\"Национализам/ревизионизам\", short:\"Национализам\", c:\"var(--nat)\", bg:\"var(--nat-bg)\" },\n    red:    { label:\"Говор на омраза\", short:\"Омраза\", c:\"var(--hate)\", bg:\"var(--hate-bg)\" }\n  };\n  ORDER = [\"green\",\"gray\",\"orange\",\"purple\",\"red\"];\n\n  AUTHORS = [[\"@fmishov\",132],[\"@EXYUaviation\",36],[\"@BaronMkd\",32],[\"@BillNicholov\",19],[\"@mhrmi\",17],[\"@MACEDONIA_MK\",16],[\"@TheGreekPatriot\",14],[\"@Offsidemk\",11],[\"@novinite_com\",8],[\"@AMiloshoski\",8]];\n  ENGAGEMENT = [[\"@Dav66352635859\",1358],[\"@SerbianMuscle\",945],[\"@gankacv\",537],[\"@RJaarsma\",334],[\"@OttomanArchive\",327],[\"@Dav66352635859\",326],[\"@nadidefotograf\",306],[\"@fmishov\",299],[\"@Dejan_Ilich\",268],[\"@SerbianMuscle\",258]];\n\n  getData() {\n    if (this.EMBED && this.EMBED.length) return this.EMBED;\n    return (typeof window !== \"undefined\" && window.TWEET_DATA) ? window.TWEET_DATA : [];\n  }\n\n  componentDidMount() {\n    const fb = this.props.defaultTheme === \"dark\" ? \"dark\" : \"light\";\n    let saved = null;\n    try { saved = localStorage.getItem(\"mkd-report-theme\"); } catch (e) {}\n    const prefersDark = window.matchMedia && window.matchMedia(\"(prefers-color-scheme: dark)\").matches;\n    this.applyTheme(saved || (this.props.defaultTheme ? fb : (prefersDark ? \"dark\" : \"light\")));\n    if (this.getData().length) this.setState({ loaded: true });\n    else this._tick = setInterval(() => { if (this.getData().length) { clearInterval(this._tick); this.setState({ loaded: true }); } }, 60);\n  }\n  componentWillUnmount() { if (this._tick) clearInterval(this._tick); }\n\n  applyTheme(theme) {\n    const el = this.rootRef.current, vars = this.VARS[theme] || this.VARS.light;\n    if (el) for (const k in vars) el.style.setProperty(k, vars[k]);\n    this.setState({ theme });\n    try { localStorage.setItem(\"mkd-report-theme\", theme); } catch (e) {}\n  }\n\n  toggleCat(color) {\n    this.setState(s => {\n      const has = s.cats.includes(color);\n      return { cats: has ? s.cats.filter(c => c !== color) : [...s.cats, color] };\n    });\n  }\n  soloCat(color) {\n    this.setState(s => ({ cats: (s.cats.length === 1 && s.cats[0] === color) ? [] : [color] }));\n  }\n\n  renderVals() {\n    const dot = (c, size, ring) => ({ width: size+\"px\", height: size+\"px\", borderRadius: \"50%\", background: c, flex: \"0 0 auto\", boxShadow: ring ? (\"0 0 0 3px \" + ring) : \"none\" });\n    const data = this.getData();\n    const total = data.length || 500;\n\n    // counts\n    const catCount = {}; this.ORDER.forEach(c => catCount[c] = 0);\n    const themeCount = {}, reasonCount = {};\n    data.forEach(d => {\n      if (catCount[d.color] != null) catCount[d.color]++;\n      themeCount[d.theme] = (themeCount[d.theme] || 0) + 1;\n      reasonCount[d.reason] = (reasonCount[d.reason] || 0) + 1;\n    });\n    const pct = n => (n / total * 100);\n    const pctT = n => pct(n).toFixed(1) + \"%\";\n\n    const cats = this.state.cats;\n    const catActive = c => cats.length === 0 || cats.includes(c);\n\n    // KPI tiles (all + 5)\n    const tileBase = \"appearance:none; cursor:pointer; text-align:left; font-family:inherit; border-radius:13px; padding:15px 15px 13px; transition:all .16s ease; display:flex; flex-direction:column;\";\n    const allActive = cats.length === 0;\n    const tiles = [{\n      label: \"Сите\", count: total, pctText: \"100%\",\n      dotStyle: { width:\"11px\", height:\"11px\", borderRadius:\"3px\", background:\"var(--accent)\", flex:\"0 0 auto\" },\n      style: tileBase + \"background:\" + (allActive ? \"var(--accent)\" : \"var(--surface)\") + \"; color:\" + (allActive ? \"var(--surface)\" : \"var(--text)\") + \"; border:1px solid \" + (allActive ? \"var(--accent)\" : \"var(--border)\") + \"; box-shadow:var(--shadow);\",\n      hoverStyle: allActive ? \"\" : \"background:var(--surface2);\",\n      checkStyle: \"font-size:12px; font-weight:800; color:\" + (allActive ? \"var(--surface)\" : \"transparent\") + \";\",\n      onClick: () => this.setState({ cats: [] })\n    }];\n    this.ORDER.forEach(c => {\n      const m = this.CAT[c], on = cats.includes(c);\n      tiles.push({\n        label: m.short, count: catCount[c], pctText: pctT(catCount[c]),\n        dotStyle: dot(m.c, 11),\n        style: tileBase + \"background:\" + (on ? m.bg : \"var(--surface)\") + \"; border:1px solid \" + (on ? m.c : \"var(--border)\") + \"; color:var(--text); box-shadow:\" + (on ? \"none\" : \"var(--shadow)\") + \";\",\n        hoverStyle: on ? \"\" : \"background:var(--surface2);\",\n        checkStyle: \"font-size:12px; font-weight:800; color:\" + (on ? m.c : \"transparent\") + \";\",\n        onClick: () => this.toggleCat(c)\n      });\n    });\n\n    // spectrum\n    const spectrum = this.ORDER.map(c => {\n      const m = this.CAT[c], on = catActive(c), p = pct(catCount[c]);\n      return {\n        label: m.label, pctText: pctT(catCount[c]),\n        title: m.label + \" · \" + catCount[c] + \" (\" + pctT(catCount[c]) + \")\",\n        dotStyle: dot(m.c, 9),\n        style: \"border:none; cursor:pointer; padding:0; flex:\" + p + \" 1 0; min-width:6px; background:\" + m.c + \"; opacity:\" + (on ? \"1\" : \".28\") + \"; transition:opacity .2s ease;\",\n        onClick: () => this.soloCat(c)\n      };\n    });\n\n    // theme & reason distributions\n    const buildDist = (countObj, activeVal, setter) => {\n      const entries = Object.keys(countObj).map(k => [k, countObj[k]]).sort((a,b) => b[1]-a[1]);\n      const max = entries.length ? entries[0][1] : 1;\n      return entries.map(([label, n]) => {\n        const on = activeVal === label;\n        return {\n          label, count: n, pctText: pctT(n),\n          fillStyle: { height:\"100%\", width:(n/max*100).toFixed(1)+\"%\", background: on ? \"var(--nat)\" : \"var(--faint)\", borderRadius:\"99px\", transition:\"background .15s ease\" },\n          rowStyle: \"appearance:none; cursor:pointer; font-family:inherit; width:100%; display:flex; align-items:center; gap:12px; padding:8px 10px; margin:0 -10px; border:none; border-radius:9px; background:\" + (on ? \"var(--nat-bg)\" : \"transparent\") + \"; color:var(--text); transition:background .15s ease;\",\n          hoverStyle: on ? \"\" : \"background:var(--surface2);\",\n          onClick: () => setter(on ? null : label)\n        };\n      });\n    };\n    const themesList = buildDist(themeCount, this.state.themeF, v => this.setState({ themeF: v }));\n    const reasonsList = buildDist(reasonCount, this.state.reasonF, v => this.setState({ reasonF: v }));\n\n    const authors = this.AUTHORS.map((a,i) => ({ rank: String(i+1).padStart(2,\"0\"), name: a[0], valueText: a[1] + \" твитови\" }));\n    const engagement = this.ENGAGEMENT.map((a,i) => ({ rank: String(i+1).padStart(2,\"0\"), name: a[0], valueText: a[1] + \" score\" }));\n\n    // filtered + sorted rows\n    const q = this.state.query.trim().toLowerCase();\n    let view = data.filter(d => {\n      if (cats.length && !cats.includes(d.color)) return false;\n      if (this.state.themeF && d.theme !== this.state.themeF) return false;\n      if (this.state.reasonF && d.reason !== this.state.reasonF) return false;\n      if (q) {\n        const hay = ((this.CAT[d.color] ? this.CAT[d.color].label : \"\") + \" \" + d.theme + \" \" + d.reason + \" \" + d.author + \" \" + d.text).toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\n      return true;\n    });\n\n    const col = this.state.sortCol, dir = this.state.sortDir, numeric = { n:1, likes:1, rt:1, replies:1 };\n    view = view.slice().sort((a, b) => {\n      let av, bv;\n      if (col === \"catLabel\") { av = this.CAT[a.color] ? this.CAT[a.color].label : \"\"; bv = this.CAT[b.color] ? this.CAT[b.color].label : \"\"; }\n      else { av = a[col]; bv = b[col]; }\n      let r = numeric[col] ? (av||0)-(bv||0) : String(av||\"\").localeCompare(String(bv||\"\"), \"mk\");\n      return dir === \"asc\" ? r : -r;\n    });\n\n    const rows = view.map(d => {\n      const m = this.CAT[d.color] || this.CAT.gray, exp = this.state.expanded === d.n;\n      return {\n        n: d.n, catShort: m.short, theme: d.theme, reason: d.reason, author: d.author, text: d.text,\n        likes: d.likes, rt: d.rt, replies: d.replies, expanded: exp,\n        clampClass: exp ? \"\" : \"mk-clamp2\",\n        dotStyle: dot(m.c, 7),\n        pillStyle: \"display:inline-flex; align-items:center; gap:6px; padding:4px 9px 4px 8px; border-radius:99px; background:\" + m.bg + \"; color:\" + m.c + \"; font-size:12px; font-weight:600; white-space:nowrap;\",\n        onToggle: () => this.setState(s => ({ expanded: s.expanded === d.n ? null : d.n }))\n      };\n    });\n\n    // chips\n    const chips = [];\n    cats.forEach(c => {\n      const m = this.CAT[c];\n      chips.push({ label: m.short, dotStyle: dot(m.c, 8),\n        style: \"display:inline-flex; align-items:center; gap:7px; font-family:inherit; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text); background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:6px 11px;\",\n        onRemove: () => this.toggleCat(c) });\n    });\n    if (this.state.themeF) chips.push({ label: \"Тема · \" + this.state.themeF, dotStyle: { display:\"none\" },\n      style: \"display:inline-flex; align-items:center; gap:7px; font-family:inherit; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text); background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:6px 11px;\",\n      onRemove: () => this.setState({ themeF: null }) });\n    if (this.state.reasonF) chips.push({ label: \"Причина · \" + this.state.reasonF, dotStyle: { display:\"none\" },\n      style: \"display:inline-flex; align-items:center; gap:7px; font-family:inherit; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text); background:var(--surface2); border:1px solid var(--border); border-radius:99px; padding:6px 11px;\",\n      onRemove: () => this.setState({ reasonF: null }) });\n\n    const hasFilters = cats.length > 0 || !!this.state.themeF || !!this.state.reasonF || q.length > 0;\n    const resultText = view.length === total ? (total + \" објави\") : (\"Прикажани \" + view.length + \" од \" + total);\n\n    const arrow = dir === \"asc\" ? \" ↑\" : \" ↓\";\n    const ind = {};\n    [\"n\",\"catLabel\",\"theme\",\"author\",\"likes\",\"rt\",\"replies\"].forEach(k => ind[k] = col === k ? arrow : \"\");\n\n    return {\n      rootRef: this.rootRef,\n      onToggleTheme: () => this.applyTheme(this.state.theme === \"dark\" ? \"light\" : \"dark\"),\n      showMethod: this.props.showMethodology !== false,\n      tiles, spectrum, themesList, reasonsList, authors, engagement,\n      query: this.state.query,\n      onSearch: e => this.setState({ query: e.target.value }),\n      chips, hasFilters, onClearAll: () => this.setState({ cats: [], themeF: null, reasonF: null, query: \"\" }),\n      rows, resultText, ind, isEmpty: rows.length === 0,\n      onSort: e => { const k = e.currentTarget.dataset.sortkey; this.setState(s => ({ sortCol: k, sortDir: s.sortCol === k && s.sortDir === \"asc\" ? \"desc\" : \"asc\" })); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n</body></html>"
